name: 🔄 Sync Upstream

on:
  schedule:
    # 每两天北京时间 09:00 检查一次（UTC 01:00）
    - cron: '0 1 */2 * *'
  workflow_dispatch:  # 也可手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/ZhuLinsen/daily_stock_analysis.git
          git fetch upstream main

      - name: Check for updates
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main 2>/dev/null || echo "0")
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "落后上游 $BEHIND 个 commit"

      - name: Merge upstream into main
        if: steps.check.outputs.behind > 0
        run: |
          git config user.name "dxl-sync-bot"
          git config user.email "duxianglai@users.noreply.github.com"
          git merge upstream/main --no-edit --allow-unrelated-histories
          git push origin main
          echo "已同步上游更新"
